<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>
    <style>
        body { font-family: Arial; }
        header, footer { background: lightgray; padding: 10px; }
        nav a { margin: 10px; }
        section { margin: 20px; }
    </style> 
</head> 

<body>

<header>
    <h1>My Website</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<main>

<section>
    <h2>About</h2>
    <p>This is a <b>simple</b> website using <i>HTML tags</i>.</p>
    <p>Water formula: H<sub>2</sub>O</p>
</section>

<section>
    <h2>List Example</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</section>

<section>
    <h2>Image</h2>
    <img src="/" width="200" alt="Sample Image">
</section>

<section>
    <h2>Form</h2>
    <form>
        <label>Name:</label>
        <input type="text" placeholder="Enter name"><br><br>

        <label>Email:</label>
        <input type="email"><br><br>

        <button>Submit</button>
    </form>
</section>

</main>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
