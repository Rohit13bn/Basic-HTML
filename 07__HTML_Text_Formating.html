<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formating</title>
</head>
<body>
<b>Bold text</b><br> <!-- Bold Text -->
<strong>Important text</strong><br> <!-- Strong Text -->
<i>Italic text</i><br> <!-- Italic Text -->
<em>Emphasized text</em><br> <!-- Emphasized Text -->
<u>Underlined text</u><br> <!-- Underlined Text -->
<mark>Highlighted text</mark><br> <!-- Highlighted Text -->
<small>Smaller text</small><br> <!-- Smaller Text -->
<del>Deleted text</del><br> <!-- Deleted Text -->
<ins>Inserted text</ins><br> <!-- Inserted Text -->
<sub>Subscript</sub><br> <!-- Subscript -->
<sup>Superscript</sup><br> <!-- Superscript -->
</body>
</html>
