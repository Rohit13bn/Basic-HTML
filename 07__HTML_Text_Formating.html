<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formating</title>
</head>
<body>
<b>Bold heading</b><br>
<strong>Very important notice</strong><br>
<i>Stylish italic text</i><br>
<em>Strong emphasis</em><br>
<u>Underlined content</u><br>
<mark>Highlighted keyword</mark><br>
<small>Fine print text</small><br>
<del>Removed information</del><br>
<ins>Newly added information</ins><br>
<sub>Subscript value</sub><br>
<sup>Superscript value</sup><br>
</body>
</html>
