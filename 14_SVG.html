<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Premium Background</title>
</head>
<body style="margin:0;overflow:hidden;background:#0b1120;">
<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1600 900"
width="100%"
height="100%"
preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">
<stop offset="0%"
stop-color="#0F172A">
<animate attributeName="stop-color"
values="#0F172A;#172554;#0F172A"
dur="35s"
repeatCount="indefinite"/>
</stop>
<stop offset="100%"
stop-color="#334155">
<animate attributeName="stop-color"
values="#334155;#1E3A8A;#334155"
dur="35s"
repeatCount="indefinite"/>
</stop>
</linearGradient>
<filter id="blur"
x="-60%"
y="-60%"
width="220%"
height="220%">
<feGaussianBlur stdDeviation="115"/>
</filter>
<linearGradient id="shade">
<stop offset="0%"
stop-color="#000"
stop-opacity="0"/>
<stop offset="100%"
stop-color="#020617"
stop-opacity=".45"/>
</linearGradient>
</defs>
<!-- Background -->
<rect width="1600"
height="900"
fill="url(#bg)"/>
<!-- Glow 1 -->
<ellipse
cx="240"
cy="250"
rx="260"
ry="190"
fill="#7DD3FC"
opacity=".18"
filter="url(#blur)">
<animate attributeName="cx"
values="240;420;240"
dur="28s"
repeatCount="indefinite"/>
<animate attributeName="cy"
values="250;360;250"
dur="26s"
repeatCount="indefinite"/>
</ellipse>
<!-- Glow 2 -->
<ellipse
cx="1320"
cy="220"
rx="280"
ry="200"
fill="#C4B5FD"
opacity=".16"
filter="url(#blur)">
<animate attributeName="cx"
values="1320;1080;1320"
dur="32s"
repeatCount="indefinite"/>
<animate attributeName="cy"
values="220;300;220"
dur="29s"
repeatCount="indefinite"/>
</ellipse>
<!-- Glow 3 -->
<ellipse
cx="820"
cy="760"
rx="300"
ry="220"
fill="#93C5FD"
opacity=".14"
filter="url(#blur)">
<animate attributeName="cy"
values="760;560;760"
dur="30s"
repeatCount="indefinite"/>
</ellipse>
<!-- Small Glow -->
<ellipse
cx="760"
cy="150"
rx="140"
ry="90"
fill="#BFDBFE"
opacity=".08"
filter="url(#blur)">
<animate attributeName="cx"
values="760;900;760"
dur="24s"
repeatCount="indefinite"/>
</ellipse>
<!-- Smooth Dark Layer -->
<rect
width="1600"
height="900"
fill="url(#shade)"/>
</svg>
</body>
</html>
